<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>View books</title>

        <!-- Bootstrap CSS CDN -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body>
        <div class="container">

            <h1>Books</h1>

            <div>
                <button class="btn btn-primary">Create</button>
            </div>

            <br/>

            <div>
                <!-- Step 2: class="table" added, border="1" removed -->
                <table class="table">
                    <tr>
                        <th>id</th>
                        <th>Title</th>
                        <th>Author</th>
                        <th>Price</th>
                        <th>Update</th>
                        <th>Delete</th>
                    </tr>
                    <tr>
                        <td>1</td>
                        <td>Brave New World</td>
                        <td>Aldous Huxley</td>
                        <td>12</td>
                        <td><button class="btn btn-warning btn-sm">update</button></td>
                        <td><button class="btn btn-danger btn-sm">delete</button></td>
                    </tr>
                </table>
            </div>

            <div>
                <h2>
                    <span>Create a</span>
                    <span style="display:none">Update this</span>
                    Book
                </h2>

                <!-- Step 3: Bootstrap form styling -->
                <div class="mb-3">
                    <label class="form-label">id</label>
                    <input type="text" name="id" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Title</label>
                    <input type="text" name="title" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Author</label>
                    <input type="text" name="author" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Price</label>
                    <input type="number" name="price" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Just to show select</label>
                    <select name="status" class="form-select">
                        <option value="instock">in stock</option>
                        <option value="outstock">out of stock</option>
                        <option value="other">out of print</option>
                    </select>
                </div>

                <span><button class="btn btn-primary">Create</button></span>
                <span style="display:none"><button class="btn btn-warning">Update</button></span>
            </div>

        </div>

        <!-- Bootstrap JavaScript CDN -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
